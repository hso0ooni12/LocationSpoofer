name: Build iOS Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Prepare Project Structure
      run: |
        if [ -f "project.zip" ]; then
          unzip -o project.zip || true
        fi
        mkdir -p Source
        mv *.m *.h Source/ 2>/dev/null || true

    - name: Clone Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos

    - name: Download iOS 16 SDK (Ultra Fast & Reliable)
      run: |
        cd ~/theos/sdks
        git init
        git remote add origin https://github.com/xybp888/iOS-SDKs.git
        git config core.sparseCheckout true
        echo "iPhoneOS16.5.sdk/*" >> .git/info/sparse-checkout
        git pull --depth 1 origin master

    - name: Compile Tweak
      run: |
        export THEOS=~/theos
        make FINALPACKAGE=1

    - name: Upload dylib Product
      uses: actions/upload-artifact@v4
      with:
        name: LocationSpoofer-dylib
        path: .theos/obj/LocationSpoofer.dylib
