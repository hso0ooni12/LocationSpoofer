name: Build iOS Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: |
        unzip project.zip

    - name: Clone Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git ~/theos

    - name: Download iOS SDKs (Fast Method)
      run: |
        mkdir -p ~/theos/sdks
        curl -LO https://github.com/theos/sdks/archive/refs/heads/master.zip
        unzip master.zip -d ~/theos/sdks
        mv ~/theos/sdks/sdks-master/* ~/theos/sdks/
        rm -rf master.zip ~/theos/sdks/sdks-master

    - name: Compile Tweak
      run: |
        export THEOS=~/theos
        make FINALPACKAGE=1

    - name: Upload dylib Product
      uses: actions/upload-artifact@v4
      with:
        name: LocationSpoofer-dylib
        path: .theos/obj/LocationSpoofer.dylib
